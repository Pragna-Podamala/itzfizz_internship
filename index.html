<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>W E L C O M E — I T Z F I Z Z</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#08080a;
  --surface:#0f0f12;
  --ink:#f0ece4;
  --muted:#52525a;
  --ring-size:min(58vw,500px);
  --c0:#ff4d1c;--c1:#ffaa00;--c2:#ffe100;
  --c3:#00e57a;--c4:#00c2ff;--c5:#b06ef5;--c6:#ff4d6d;
}

html{scroll-behavior:auto}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;overflow-x:hidden;cursor:none}

/* FIX 3 — touch: restore system cursor, hide custom */
@media(pointer:coarse){
  body{cursor:auto}
  .cursor,.cursor-ring{display:none!important}
}

/* ── CURSOR ──────────────────────────────────────── */
.cursor{
  position:fixed;width:8px;height:8px;
  background:var(--ink);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .18s,height .18s,background .2s;
  will-change:transform;
}
.cursor-ring{
  position:fixed;width:32px;height:32px;
  border:1px solid rgba(240,236,228,.25);border-radius:50%;
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .28s,height .28s,border-color .2s;
  will-change:transform;
}
/* FIX 1 — JS adds/removes .active (no :has()) */
.cursor.active{width:5px;height:5px;background:var(--c0)}
.cursor-ring.active{width:48px;height:48px;border-color:var(--c0)}

/* ── NAV ─────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.6rem 3.5rem;
}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.2em;opacity:0;transform:translateY(-14px)}
.nav-links{display:flex;gap:2.2rem}
.nav-links a{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .25s,letter-spacing .3s;opacity:0;transform:translateY(-10px)}
.nav-links a:hover{color:var(--ink);letter-spacing:.24em}

/* ── HERO ────────────────────────────────────────── */
#hero{
  position:relative;height:100vh;min-height:620px;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 3.5rem 5rem;overflow:hidden;
  scroll-snap-align:start;
}
#hero::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.055) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}

/* ── ORB ─────────────────────────────────────────── */
.orb-wrap{
  position:absolute;top:50%;left:58%;
  width:var(--ring-size);aspect-ratio:1;
  transform:translate(-50%,-50%);
  will-change:transform;pointer-events:none;z-index:1;
}
.ring{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,#ff4d1c 0%,#ffaa00 14%,#ffe100 28%,#00e57a 44%,#00c2ff 60%,#b06ef5 76%,#ff4d6d 90%,#ff4d1c 100%);
  animation:spin 20s linear infinite;will-change:transform;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ring-mask{position:absolute;top:10%;left:10%;width:80%;height:80%;border-radius:50%;background:var(--bg)}
.ring-glow{
  position:absolute;inset:10%;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,rgba(176,110,245,.2),transparent 65%);
  animation:glow 4s ease-in-out infinite;
}
@keyframes glow{0%,100%{opacity:.45}50%{opacity:1}}
.ring-tag{
  position:absolute;bottom:16%;right:8%;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,2vw,1.5rem);letter-spacing:.12em;
  color:var(--ink);opacity:0;transform:translateY(10px);
}

/* year stamp */
.hero-year{
  position:absolute;top:50%;right:2.5rem;
  transform:translateY(-50%) rotate(90deg);
  font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);z-index:2;opacity:0;
}

/* ── HEADLINE ────────────────────────────────────── */
.hero-headline{
  position:relative;z-index:2;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,9.5vw,9.5rem);
  line-height:.9;letter-spacing:.28em;
  will-change:transform,opacity;
}
.hl-line{display:block;overflow:hidden;padding-bottom:.06em}
.hl-word{display:inline-flex}

/* each letter is built by JS */
.hl-letter{
  display:inline-block;
  transform:translateY(115%);
  will-change:transform;
  cursor:none;
}
/* color classes */
.hl-letter.cw{color:var(--ink)}
.hl-letter.c0{color:var(--c0)}
.hl-letter.c1{color:var(--c1)}
.hl-letter.c2{color:var(--c2)}
.hl-letter.c3{color:var(--c3)}
.hl-letter.c4{color:var(--c4)}
.hl-letter.c5{color:var(--c5)}
.hl-letter.c6{color:var(--c6)}

/* ── STATS ───────────────────────────────────────── */
.hero-stats{
  position:relative;z-index:2;
  display:flex;gap:0;margin-top:2.8rem;
}
.stat{
  padding-right:2.8rem;
  opacity:0;transform:translateY(28px);
  will-change:opacity,transform;cursor:none;
}
.stat:not(:last-child){
  border-right:1px solid rgba(255,255,255,.07);
  margin-right:2.8rem;
}
.stat:hover .stat-num{text-shadow:0 0 32px rgba(176,110,245,.55)}
.stat:hover .stat-bar{background:linear-gradient(90deg,var(--c0),var(--c2))}

.stat-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2rem,4.5vw,3.6rem);
  line-height:1;letter-spacing:.04em;
  transition:text-shadow .3s;
}
.stat-bar{
  width:0;height:2px;margin-top:.55rem;border-radius:2px;
  background:linear-gradient(90deg,var(--c4),var(--c5));
  transition:background .4s;
}
.stat-desc{
  font-size:.66rem;letter-spacing:.13em;text-transform:uppercase;
  color:var(--muted);margin-top:.4rem;max-width:13ch;line-height:1.55;
}

/* ── SCROLL CUE ──────────────────────────────────── */
.scroll-cue{
  position:absolute;bottom:2.8rem;right:3.5rem;
  display:flex;align-items:center;gap:.7rem;
  font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);opacity:0;z-index:2;
}
.scroll-line{width:36px;height:1px;background:rgba(255,255,255,.12);position:relative;overflow:hidden}
.scroll-line::after{
  content:'';position:absolute;left:-100%;top:0;
  width:100%;height:100%;
  background:linear-gradient(90deg,var(--c4),var(--c5));
  animation:sweep 2.2s ease-in-out infinite;
}
@keyframes sweep{0%{left:-100%}55%,100%{left:120%}}

/* ── SNAP SECTIONS ───────────────────────────────── */
.snap-root{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth}

.spacer{
  height:100vh;background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  scroll-snap-align:start;
}
.spacer-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem,5vw,5rem);letter-spacing:.22em;
  background:linear-gradient(135deg,var(--c4),var(--c5),var(--c0));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:.65;
}

/* ── RESPONSIVE ──────────────────────────────────── */
@media(max-width:680px){
  nav{padding:1rem 1.5rem}
  #hero{padding:0 1.5rem 3.5rem}
  .hero-stats{flex-direction:column;gap:0}
  .stat{padding-right:0;padding-bottom:1.4rem;margin-right:0!important}
  .stat:not(:last-child){border-right:none;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:1.4rem}
  .orb-wrap{left:50%;top:36%}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="snap-root" id="snapRoot">

<nav>
  <span class="nav-logo" id="navLogo">Itzfizz</span>
  <div class="nav-links" id="navLinks">
    <a href="#">Work</a><a href="#">Services</a>
    <a href="#">About</a><a href="#">Contact</a>
  </div>
</nav>

<section id="hero">

  <div class="orb-wrap" id="orbWrap">
    <div class="ring" id="ring"></div>
    <div class="ring-mask"></div>
    <div class="ring-glow"></div>
    <span class="ring-tag" id="ringTag">Digital</span>
  </div>

  <span class="hero-year" id="heroYear">Est. 2020</span>

  <h1 class="hero-headline">
    <span class="hl-line"><span class="hl-word" id="word1"></span></span>
    <span class="hl-line"><span class="hl-word" id="word2"></span></span>
  </h1>

  <div class="hero-stats">
    <div class="stat" id="s1">
      <div class="stat-num" id="n1">98%</div>
      <div class="stat-bar" id="b1"></div>
      <div class="stat-desc">Client satisfaction</div>
    </div>
    <div class="stat" id="s2">
      <div class="stat-num" id="n2">120+</div>
      <div class="stat-bar" id="b2"></div>
      <div class="stat-desc">Projects delivered</div>
    </div>
    <div class="stat" id="s3">
      <div class="stat-num" id="n3">4×</div>
      <div class="stat-bar" id="b3"></div>
      <div class="stat-desc">Average ROI</div>
    </div>
    <div class="stat" id="s4">
      <div class="stat-num" id="n4">6yr</div>
      <div class="stat-bar" id="b4"></div>
      <div class="stat-desc">Industry experience</div>
    </div>
  </div>

  <div class="scroll-cue" id="scrollCue">
    Scroll <span class="scroll-line"></span>
  </div>

</section>

<div class="spacer">
  <p class="spacer-text">Crafting Digital Experiences</p>
</div>

</div><!-- /snap-root -->

<script>
gsap.registerPlugin(ScrollTrigger);

/* FIX 2 — Performance */
ScrollTrigger.config({ limitCallbacks: true });
gsap.ticker.lagSmoothing(1000, 16);

/* ── BUILD LETTERS ───────────────────────────────── */
// WELCOME — all base ink color
'WELCOME'.split('').forEach(ch => {
  const s = document.createElement('span');
  s.className = 'hl-letter cw';
  s.textContent = ch;
  document.getElementById('word1').appendChild(s);
});

// ITZFIZZ — each letter unique color, matching the ring's conic gradient
const itzCols = ['c4','c2','c0','c5','c3','c1','c6']; // I=cyan T=yellow Z=orange F=purple I=green Z=amber Z=pink
'ITZFIZZ'.split('').forEach((ch, i) => {
  const s = document.createElement('span');
  s.className = 'hl-letter ' + itzCols[i];
  s.textContent = ch;
  document.getElementById('word2').appendChild(s);
});

/* ── FIX 1: CURSOR — pure JS, no :has() ─────────── */
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;

window.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

(function tickCursor(){
  cursor.style.left = mx+'px'; cursor.style.top = my+'px';
  rx += (mx-rx)*0.09; ry += (my-ry)*0.09;
  cursorRing.style.left = rx+'px'; cursorRing.style.top = ry+'px';
  requestAnimationFrame(tickCursor);
})();

document.querySelectorAll('a, .stat').forEach(el => {
  el.addEventListener('mouseenter', () => { cursor.classList.add('active'); cursorRing.classList.add('active'); });
  el.addEventListener('mouseleave', () => { cursor.classList.remove('active'); cursorRing.classList.remove('active'); });
});

/* ── INTRO TIMELINE ──────────────────────────────── */
const intro = gsap.timeline({ defaults: { ease: 'power3.out' } });

intro.to('#navLogo',    { opacity:1, y:0, duration:.9 }, 0.1);
intro.to('#navLinks a', { opacity:1, y:0, duration:.7, stagger:.1 }, 0.2);

intro.fromTo('#orbWrap',
  { opacity:0, scale:.45, rotation:-20 },
  { opacity:1, scale:1, rotation:0, duration:1.9, ease:'expo.out' }, 0
);

// WELCOME: per-letter stagger
intro.to('#word1 .hl-letter', { y:'0%', duration:1.0, stagger:.06, ease:'expo.out' }, 0.5);

// ITZFIZZ: per-letter with back overshoot (looks premium)
intro.to('#word2 .hl-letter', { y:'0%', duration:1.0, stagger:.08, ease:'back.out(1.7)' }, 0.68);

intro.to('#ringTag', { opacity:1, y:0, duration:.65 }, 1.1);

intro.to(['#s1','#s2','#s3','#s4'], {
  opacity:1, y:0, duration:.8, stagger:.13, ease:'back.out(1.5)'
}, 0.88);

intro.to(['#b1','#b2','#b3','#b4'], { width:'85%', duration:1.2, stagger:.13, ease:'power2.out' }, 1.0);
intro.to('#heroYear',  { opacity:1, duration:.5 }, 1.2);
intro.to('#scrollCue', { opacity:1, duration:.5 }, 1.55);

/* ── COUNTER ANIMATION ───────────────────────────── */
[
  { id:'#n1', from:80,  to:98,  sfx:'%'  },
  { id:'#n2', from:100, to:120, sfx:'+'  },
  { id:'#n3', from:1,   to:4,   sfx:'×'  },
  { id:'#n4', from:1,   to:6,   sfx:'yr' },
].forEach(({ id, from, to, sfx }) => {
  const node = document.querySelector(id);
  const obj = { v: from };
  gsap.to(obj, {
    v: to, delay: 0.9, duration: 1.7, ease: 'power2.out',
    onUpdate() { node.textContent = Math.round(obj.v) + sfx; }
  });
});

/* ── SCROLL: 3 DEPTH LAYERS ──────────────────────── */
const scroller = document.getElementById('snapRoot');
ScrollTrigger.defaults({ scroller });

// Layer A — Orb (moves most = feels deepest in scene)
gsap.to('#orbWrap', {
  y:'-42vh', scale:.55, rotation:20,
  ease:'none',
  scrollTrigger:{ trigger:'#hero', start:'top top', end:'bottom top', scrub:1.6 }
});

// Layer B — Headline (medium speed)
gsap.to('.hero-headline', {
  y:'-20vh', opacity:0, ease:'none',
  scrollTrigger:{ trigger:'#hero', start:'top top', end:'70% top', scrub:2.0 }
});

// Layer C — Stats (slowest = feels in front)
gsap.to('.hero-stats', {
  y:'-9vh', opacity:0, ease:'none',
  scrollTrigger:{ trigger:'#hero', start:'top top', end:'52% top', scrub:2.5 }
});

// Ring spin accelerates as user scrolls
ScrollTrigger.create({
  trigger:'#hero', start:'top top', end:'bottom top',
  onUpdate(self){
    document.querySelector('.ring').style.animationDuration = Math.max(5, 20 - self.progress*15) + 's';
  }
});

/* ── MOUSE PARALLAX (only near top) ─────────────── */
let tMx=0,tMy=0,cMx=0,cMy=0;
window.addEventListener('mousemove', e=>{
  tMx=(e.clientX/window.innerWidth -.5)*42;
  tMy=(e.clientY/window.innerHeight-.5)*26;
});
(function mp(){
  const pct = scroller.scrollTop/(scroller.scrollHeight - scroller.clientHeight)||0;
  cMx+=(tMx-cMx)*.05; cMy+=(tMy-cMy)*.05;
  if(pct < 0.1) gsap.set('#ring',{ x:cMx*.6, y:cMy*.6 });
  requestAnimationFrame(mp);
})();

/* ── ITZFIZZ letter hover: pop + glow ───────────── */
document.querySelectorAll('#word2 .hl-letter').forEach(l => {
  l.style.transition = 'transform .22s cubic-bezier(.34,1.56,.64,1), text-shadow .22s';
  l.addEventListener('mouseenter', () => {
    l.style.transform = 'translateY(-8px) scale(1.2)';
    l.style.textShadow = '0 0 28px currentColor, 0 0 56px currentColor';
  });
  l.addEventListener('mouseleave', () => {
    l.style.transform = '';
    l.style.textShadow = '';
  });
});
</script>
</body>
</html>
